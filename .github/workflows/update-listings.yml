name: Update Listings Daily

on:
  schedule:
    - cron: '0 12 * * *'  # Every day at 12:00 UTC (7 AM ET)
  workflow_dispatch:  # Allow manual trigger

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Fetch latest listings
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        run: python fetch_and_export.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/listings.json
          git diff --staged --quiet || git commit -m "Update listings data $(date -u +%Y-%m-%d)"
          git push
